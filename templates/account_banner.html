{% load static %}

<div class="account-page">
        <div class="container">
            <div class="row">
                <div class="col-2">
                    <img src="{% static 'images/image1.png' %}" width="100%">
                </div>
                <div class="col-2">
                    {% if messages %}
                    <div class="message-container">
                        {% for message in messages %}
                            <li class="alert alert-{{ message.tags }}">{{ message }}</li>
                        {% endfor %}
                    </div>
                    {% endif %}
                    <br>
                    <div class="form-container">
                        <div class="form-btn">
                            <span onclick="login()">Login</span>
                            <span onclick="register()">Register</span>
                            <hr id="Indicator">
                        </div>
                        <form id="LoginForm" method="post" enctype="multipart/form-data">
                                {% csrf_token %}
                            <input type="text" name="username" placeholder="Username">
                            <input type="password" required name="password" placeholder="Password">
                            <button type="submit" name="login" class="btn">Login</button>
                            <a href="{% url 'logout' %}"><button type="button" class="btn">Logout</button></a>
                            <a href="">Forget Password</a>
                        </form>

                        <form id="RegForm" method="post" enctype="multipart/form-data">
                             {% csrf_token %}
                            <input type="text" name="username" maxlength="20" minlength="6" required placeholder="Username">
                            <input type="email" name="email" required placeholder="Email">
                            <input type="password" name="password" minlength="8" maxlength="100" required placeholder="Password">
                            <input type="text" name="address" maxlength="200" required placeholder="Address">
                            <input type="text" name="phone" maxlength="13" minlength="10" required placeholder="Phone Number">
                            <button type="submit" name="register" class="btn">Register</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
